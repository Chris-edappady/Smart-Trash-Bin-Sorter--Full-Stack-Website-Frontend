<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trash Dashboard</title>

  <!-- link for css stylesheet -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Vue.js -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
<div id="app">
  <!-- Header -->
  <header class="site-header">
    <div class="header-left"></div>

    <div class="header-center">
      <h1 class="main-title">Dashboard</h1>
    </div>

    <div class="header-right"></div>
  </header>

  <!-- main container  -->
  <main class="container">
    <!-- Category Cards-->
    <section class="top-cards">

      <div class="cat-card" v-for="cat in categories" :key="cat.name">
        <div class="cat-name">{{ cat.name }}</div>
        <div class="progress-ring"
        :style="{
            background: 'conic-gradient(#4CAF50 ' + cat.level + '%, #e5e7eb ' + cat.level + '%)'
          }">
          <div class="ring-inner">
            <div class="pct-text">{{ cat.level }}%</div>
          </div>
        </div>
        <div class="items-count">{{ cat.count }} items</div>
      </div>
    </section>
  </main>
</div>
<script src="getReadings.js"></script>
<script src="vue.js"></script>
</body>
</html>
