<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trash Dashboard</title>

  <!-- link for css stylesheet -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Vue.js -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<div id="app">
  <!-- Header -->
  <header class="site-header">
    <div class="header-left"></div>

    <div class="header-center">
      <h1 class="main-title">Dashboard</h1>
    </div>

    <div class="header-right"></div>
  </header>

  <!-- main container  -->
  <main class="container">
    <!-- Category Cards-->
    <section class="top-cards">

      <div class="cat-card" v-for="cat in categoryOrder" :key="cat.key">
        <div class="cat-name">{{ cat.name }}</div>
        <div class="progress-ring"
        :style="{
          background: 'conic-gradient(' + cat.color + ' ' + (topLevels[cat.key] || 0) + '%, #e5e7eb ' + (topLevels[cat.key] || 0) + '%)'
        }">
          <div class="ring-inner">
            <div class="pct-text">{{ Math.round(topLevels[cat.key] || 0) }}%</div>
          </div>
        </div>
        <div class="items-count">{{ itemCounts[cat.key] || 0 }} items</div>
      </div>
    </section>
    <!-- Fill levels chart -->
    <div style="margin-top:20px; background:#fff; padding:16px; border-radius:10px;">
      <h3>Fill Levels</h3>
      <canvas id="historyChart" style="width:100%; height:320px;"></canvas>
    </div>
    <!-- Doughnut chart -->
     <!-- Composition Doughnut Chart -->
    <div style="margin-top:20px; background:#fff; padding:16px; border-radius:10px;">
      <h3>Category Composition</h3>
      <canvas id="compositionChart" style="width:100%; height:300px;"></canvas>
    </div>
    <!-- Stacked Bar Chart for 7 days -->
    <div style="margin-top:20px; background:#fff; padding:16px; border-radius:10px;">
      <h3>Daily Totals</h3>
      <canvas id="dailyTotalsChart" style="width:100%; height:300px;"></canvas>
    </div>

  </main>
</div>
<script src="getReadings.js"></script>
<script src="vue.js"></script>
</body>
</html>
