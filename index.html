<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Waste Dashboard</title>

  <!-- link for css stylesheet -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-left"></div>

    <div class="header-center">
      <h1 class="main-title">Dashboard</h1>
    </div>

    <div class="header-right"></div>
  </header>

  <!-- main container  -->
  <main class="container">
    <!-- Category Cards-->
    <section class="top-cards">

      <div class="cat-card">
        <div class="cat-name">Paper</div>
        <div class="progress-ring">
          <div class="pct-text">0%</div>
        </div>
        <div class="items-count">0 items</div>
      </div>

      <div class="cat-card">
        <div class="cat-name">Plastic</div>
        <div class="progress-ring">
          <div class="pct-text">0%</div>
        </div>
        <div class="items-count">0 items</div>
      </div>

      <div class="cat-card">
        <div class="cat-name">Metal</div>
        <div class="progress-ring">
          <div class="pct-text">0%</div>
        </div>
        <div class="items-count">0 items</div>
      </div>

      <div class="cat-card">
        <div class="cat-name">General</div>
        <div class="progress-ring">
          <div class="pct-text">0%</div>
        </div>
        <div class="items-count">0 items</div>
      </div>

    </section>
  </main>
  <script src="vue.js"></script>
</body>
</html>
